name: Update Metal Prices

on:
  schedule:
    - cron: '0 0 * * *'  # Runs every day at midnight UTC
  workflow_dispatch:      # Allows you to click "Run workflow" manually

jobs:
  build:
    runs-on: ubuntu-latest
    
    # This section is CRITICAL to allow the bot to save files back to your repo
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        env:
          METALS_API_KEY: ${{ secrets.METALS_API_KEY }}
        run: python fetch_prices.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Only add the files if they actually exist/were created
          git add USD.json EUR.json || echo "Files not found"
          
          # Commit only if there are changes; "exit 0" prevents the action from failing if nothing changed
          git commit -m "Update prices: $(date)" || exit 0
          
          # Push using the automatic GITHUB_TOKEN for authentication
          git push
